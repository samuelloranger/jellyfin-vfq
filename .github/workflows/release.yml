name: Build and Release Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build
        run: dotnet build --configuration Release

      - name: Create plugin zip
        run: |
          cd Jellyfin.Plugin.VFQ/bin/Release/net9.0
          zip -j Jellyfin.Plugin.VFQ_${{ github.ref_name }}.zip Jellyfin.Plugin.VFQ.dll

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Jellyfin.Plugin.VFQ/bin/Release/net9.0/Jellyfin.Plugin.VFQ_${{ github.ref_name }}.zip
          generate_release_notes: true
