name: Build and Release Plugin

on:
  push:
    branches:
      - main
    paths:
      - 'Jellyfin.Plugin.VFQ/**'
      - 'Directory.Build.props'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    # Skip commits made by this workflow to avoid infinite loops.
    if: "!contains(github.event.head_commit.message, '[ci skip]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine next version
        id: version
        run: |
          # Get the latest version tag, default to v0.0.0.0 if none.
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0.0"
          fi
          echo "Latest tag: $LATEST_TAG"

          # Parse version parts: major.minor.patch.revision
          VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH REV <<< "$VERSION"

          # Bump patch
          PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}.${REV}"
          NEW_TAG="v${NEW_VERSION}"

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "Bumping: $LATEST_TAG -> $NEW_TAG"

      - name: Update Directory.Build.props
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cat > Directory.Build.props << EOF
          <Project>
              <PropertyGroup>
                  <Version>${VERSION}</Version>
                  <AssemblyVersion>${VERSION}</AssemblyVersion>
                  <FileVersion>${VERSION}</FileVersion>
              </PropertyGroup>
          </Project>
          EOF

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build
        run: dotnet build --configuration Release

      - name: Create plugin zip
        id: zip
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ZIP_NAME="Jellyfin.Plugin.VFQ_${TAG}.zip"
          ZIP_PATH="Jellyfin.Plugin.VFQ/bin/Release/net9.0/${ZIP_NAME}"
          cd Jellyfin.Plugin.VFQ/bin/Release/net9.0
          zip -j "$ZIP_NAME" Jellyfin.Plugin.VFQ.dll
          cd -
          CHECKSUM=$(md5sum "$ZIP_PATH" | awk '{print $1}')
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"

      - name: Update manifest.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          CHECKSUM="${{ steps.zip.outputs.checksum }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SOURCE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/Jellyfin.Plugin.VFQ_${TAG}.zip"
          COMMIT_MSG=$(git log -1 --pretty=%s)

          python3 << PYEOF
          import json

          with open("manifest.json", "r") as f:
              manifest = json.load(f)

          new_version = {
              "version": "${VERSION}",
              "changelog": "${COMMIT_MSG}",
              "targetAbi": "10.11.7.0",
              "sourceUrl": "${SOURCE_URL}",
              "checksum": "${CHECKSUM}",
              "timestamp": "${TIMESTAMP}"
          }

          manifest[0]["versions"].insert(0, new_version)

          with open("manifest.json", "w") as f:
              json.dump(manifest, f, indent=2, ensure_ascii=False)
              f.write("\n")
          PYEOF

      - name: Commit version bump
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Directory.Build.props manifest.json
          git commit -m "Release ${TAG}: update manifest and version [ci skip]"
          git tag "$TAG"
          git push origin main --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: ${{ steps.zip.outputs.zip_path }}
          generate_release_notes: true
